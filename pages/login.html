<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Department Login</title>

  <link rel="stylesheet" href="../css/login.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="login-container">

    <div class="overlay"></div>

    <div class="login-box">

      <div class="logo-section">
        <img src="../images/Logo_of_Kerala_Forest_Department.png" alt="">
      </div>

      <h1>Department Login</h1>

      <p>
        Kerala Forest Department <br>
        Chalakudy Division Forest Office
      </p>

      <form id="loginForm">

        <div class="input-group">
          <label>Username</label>
          <input type="text" placeholder="Enter Username" required>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Enter Password" required>
        </div>

        <div class="remember-section">

          <div class="remember">
            <input type="checkbox">
            <span>Remember Me</span>
          </div>

          <a href="#">Forgot Password?</a>

        </div>

        <button type="submit" class="main-login-btn">
          Login
        </button>

      </form>

      <div class="register-link">
        <p>
          Don't have an account?
          <a href="register.html">Register</a>
        </p>
      </div>

      <div class="back-home">
        <a href="../index.html">← Back to Homepage</a>
      </div>

    </div>

  </div>

  <script src="../js/login.js"></script>

</body>
</html>
